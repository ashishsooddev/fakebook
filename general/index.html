<!DOCTYPE html>
<html>
<head>
  <title>Fakebook</title>
  <link rel="stylesheet" href="./assets/style/index.css">
  <script type="module" src="./assets/script/data.js" defer></script>
</head>

<body>

<header class="topbar">
  <h2>Fakebook</h2>

  <ul class="menu">
    <li><button>Friends</button></li>
    <li><button>Groups</button></li>
    <li><button>Pages</button></li>
    <li><button>Settings</button></li>
  </ul>

  <img src="" id="profileIcon">
</header>

<main>

    <section class="postArea">
        <form id="postAreaForm">
            <textarea id="postMessage" placeholder="Share something..."></textarea>
            <input type="file" id="uploadImage">
            <button id="submitPost" disabled>Post</button>
        </form>
    </section>

    <section id="feedContainer"></section>
</main>

</body>
</html>
